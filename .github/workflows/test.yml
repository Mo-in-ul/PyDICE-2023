name: smoke-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy numba matplotlib seaborn pandas openpyxl pytest
          pip install -e .

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v

      - name: Run validation tests (regression)
        run: pytest tests/test_validation.py -v

      - name: Run GAMS comparison tests
        run: pytest tests/test_validation.py -m gams -v
